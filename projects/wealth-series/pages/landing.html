<html lang="en">
<head>
<meta charset="UTF-8">

<title>TradeAlgo — Watch This Presentation</title>

<style>
/* ══════════════════════════════════════════════
   TradeAlgo VSL Landing Page
   Classic blank-page design — video + delayed CTA
   ══════════════════════════════════════════════ */

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg: #0a0a0a;
  --green: #0a8754;
  --green-glow: rgba(10, 135, 84, 0.45);
  --green-light: #0ca566;
  --text: #ffffff;
  --text-muted: #8a8a8a;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

  /* ── CONFIG ── */
  --cta-delay: 300s;          /* 5 minutes — change to match your pitch moment */
  --countdown-minutes: 15;    /* Evergreen countdown starting value */
}

html, body {
  height: 100%;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
}

/* Prevent scrolling until CTA reveals (optional — remove if unwanted) */
body.locked {
  overflow: hidden;
}

/* ── LAYOUT ── */
.vsl-page {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 40px 20px;
}

/* ── HEADLINE ── */
.vsl-headline {
  font-size: 16px;
  font-weight: 500;
  color: var(--text-muted);
  letter-spacing: 0.03em;
  margin-bottom: 28px;
  text-align: center;
}

/* ── VIDEO PLAYER ── */
.video-container {
  position: relative;
  width: 100%;
  max-width: 900px;
}

.video-wrapper {
  position: relative;
  width: 100%;
  background: #111111;
  border-radius: 8px;
  overflow: hidden;
  box-shadow: 0 0 80px rgba(0, 0, 0, 0.6);
}

/* Placeholder — replace this with your Wistia/Vimeo embed */
.video-placeholder {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #111 0%, #1a1a1a 100%);
  cursor: pointer;
}

.video-placeholder .play-icon {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.1);
  border: 2px solid rgba(255, 255, 255, 0.25);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.2s, background 0.2s;
}

.video-placeholder:hover .play-icon {
  transform: scale(1.08);
  background: rgba(255, 255, 255, 0.15);
}

.play-icon::after {
  content: '';
  display: block;
  width: 0;
  height: 0;
  border-style: solid;
  border-width: 12px 0 12px 22px;
  border-color: transparent transparent transparent rgba(255, 255, 255, 0.85);
  margin-left: 4px;
}

.video-placeholder .placeholder-text {
  color: var(--text-muted);
  font-size: 13px;
  margin-top: 16px;
  letter-spacing: 0.02em;
}

/* ── CTA SECTION ── */
.cta-container {
  width: 100%;
  max-width: 900px;
  text-align: center;
  margin-top: 32px;

  /* Hidden by default */
  opacity: 0;
  transform: translateY(20px);
  pointer-events: none;
  visibility: hidden;

  /* Transition for reveal */
  transition: opacity 0.8s ease, transform 0.8s ease, visibility 0s 0.8s;
}

.cta-container.revealed {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
  visibility: visible;
  transition: opacity 0.8s ease, transform 0.8s ease, visibility 0s 0s;
}

/* ── CTA BUTTON ── */
.cta-button {
  display: inline-block;
  padding: 20px 52px;
  background: var(--green);
  color: #fff;
  font-family: var(--font);
  font-size: 19px;
  font-weight: 700;
  text-decoration: none;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  letter-spacing: -0.01em;
  position: relative;
  transition: background 0.2s, transform 0.15s;
  box-shadow:
    0 4px 24px var(--green-glow),
    0 1px 3px rgba(0, 0, 0, 0.3);
}

.cta-button:hover {
  background: var(--green-light);
  transform: translateY(-1px);
  box-shadow:
    0 6px 32px var(--green-glow),
    0 2px 6px rgba(0, 0, 0, 0.3);
}

.cta-button:active {
  transform: translateY(0);
}

/* Green pulse glow animation */
.cta-container.revealed .cta-button {
  animation: greenPulse 2.5s ease-in-out infinite;
}

@keyframes greenPulse {
  0%, 100% {
    box-shadow:
      0 4px 24px var(--green-glow),
      0 1px 3px rgba(0, 0, 0, 0.3);
  }
  50% {
    box-shadow:
      0 4px 40px rgba(10, 135, 84, 0.6),
      0 0 60px rgba(10, 135, 84, 0.2),
      0 1px 3px rgba(0, 0, 0, 0.3);
  }
}

/* ── COUNTDOWN TIMER ── */
.countdown {
  margin-top: 18px;
  font-size: 15px;
  color: var(--text-muted);
  font-weight: 500;
  letter-spacing: 0.01em;
}

.countdown-time {
  color: #fff;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}

/* ── MOBILE STICKY CTA ── */
.sticky-cta {
  display: none;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(10, 10, 10, 0.97);
  border-top: 1px solid rgba(255, 255, 255, 0.06);
  padding: 14px 16px;
  padding-bottom: calc(14px + env(safe-area-inset-bottom, 0px));
  z-index: 1000;
  text-align: center;

  /* Hidden until CTA is revealed */
  opacity: 0;
  transform: translateY(100%);
  pointer-events: none;
  transition: opacity 0.5s ease, transform 0.5s ease;
}

.sticky-cta.revealed {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}

.sticky-cta .cta-button {
  display: block;
  width: 100%;
  padding: 16px 24px;
  font-size: 17px;
  text-align: center;
}

.sticky-cta .countdown {
  margin-top: 8px;
  font-size: 13px;
}

/* ── RESPONSIVE ── */
@media (max-width: 640px) {
  .vsl-page {
    padding: 24px 12px;
    justify-content: flex-start;
    padding-top: 15vh;
  }

  .vsl-headline {
    font-size: 14px;
    margin-bottom: 20px;
  }

  .video-wrapper {
    border-radius: 4px;
  }

  /* Hide inline CTA on mobile — sticky takes over */
  .cta-container {
    display: none;
  }

  /* Show sticky CTA bar on mobile */
  .sticky-cta {
    display: block;
  }

  /* Add bottom padding so video isn't obscured by sticky bar */
  body.cta-visible {
    padding-bottom: 100px;
  }
}

/* ── MINIMAL DISCLAIMER ── */
.disclaimer {
  position: fixed;
  bottom: 8px;
  left: 0;
  right: 0;
  text-align: center;
  font-size: 11px;
  color: rgba(255, 255, 255, 0.15);
  pointer-events: none;
}

.disclaimer a {
  color: rgba(255, 255, 255, 0.2);
  text-decoration: none;
}

@media (max-width: 640px) {
  .disclaimer {
    display: none; /* Hidden on mobile — sticky CTA takes that space */
  }
}
</style>
</head>

<!-- ════════════════════════════════════════════════════════
     JAVASCRIPT — CTA Reveal + Countdown
     ════════════════════════════════════════════════════════ -->
<script>
(function() {
  'use strict';

  // ── CONFIGURATION ──────────────────────────────────────
  const CONFIG = {
    ctaDelaySeconds: 300,      // 5 minutes — match to your pitch moment
    countdownMinutes: 15,      // Evergreen countdown timer (minutes)
    countdownEnabled: true,    // Set false to hide the countdown
    triggerMethod: 'wistia'    // 'timer' | 'wistia' | 'vimeo'
  };

  // ── STATE ──────────────────────────────────────────────
  let ctaRevealed = false;

  // ── DOM REFS ───────────────────────────────────────────
  const ctaContainer   = document.getElementById('cta-container');
  const stickyCta      = document.getElementById('sticky-cta');
  const countdown      = document.getElementById('countdown');
  const countdownMobile = document.getElementById('countdown-mobile');

  // ── REVEAL CTA ─────────────────────────────────────────
  function revealCTA() {
    if (ctaRevealed) return;
    ctaRevealed = true;

    // Unlock scrolling
    document.body.classList.remove('locked');
    document.body.classList.add('cta-visible');

    // Reveal desktop CTA
    ctaContainer.classList.add('revealed');

    // Reveal mobile sticky CTA
    stickyCta.classList.add('revealed');

    // Start countdown if enabled
    if (CONFIG.countdownEnabled) {
      startCountdown();
    }
  }

  // ══════════════════════════════════════════════════════
  // METHOD A: Fixed Timer (Default)
  // Simple setTimeout — good fallback, works with any player
  // ══════════════════════════════════════════════════════
  if (CONFIG.triggerMethod === 'timer') {
    setTimeout(revealCTA, CONFIG.ctaDelaySeconds * 1000);
  }

  // ══════════════════════════════════════════════════════
  // METHOD B: Wistia Video Progress API (Recommended)
  // Triggers based on actual playback time, not wall clock
  // Handles pausing/buffering correctly
  //
  // To enable:
  //   1. Set CONFIG.triggerMethod = 'wistia'
  //   2. Replace YOUR_VIDEO_ID in the embed code above
  //   3. Uncomment the Wistia script tags in the HTML
  // ══════════════════════════════════════════════════════
  if (CONFIG.triggerMethod === 'wistia') {
    window._wq = window._wq || [];
    window._wq.push({
      id: '_all',  // Or replace with specific video ID
      onReady: function(video) {
        video.bind('timechange', function(t) {
          if (t >= CONFIG.ctaDelaySeconds) {
            revealCTA();
            video.unbind('timechange');
          }
        });

        // Optional: prevent seeking past CTA reveal point
        // Uncomment to block viewers from skipping ahead
        /*
        video.bind('seek', function(currentTime, lastTime) {
          if (!ctaRevealed && currentTime > lastTime + 3) {
            video.time(lastTime);
          }
        });
        */
      }
    });
  }

  // ══════════════════════════════════════════════════════
  // METHOD C: Vimeo Player API
  //
  // To enable:
  //   1. Set CONFIG.triggerMethod = 'vimeo'
  //   2. Add Vimeo iframe in the video-wrapper
  //   3. Include Vimeo Player.js:
  //      <script src="https://player.vimeo.com/api/player.js"></ script>
  // ══════════════════════════════════════════════════════
  if (CONFIG.triggerMethod === 'vimeo') {
    document.addEventListener('DOMContentLoaded', function() {
      var iframe = document.querySelector('#video-player iframe');
      if (iframe && typeof Vimeo !== 'undefined') {
        var player = new Vimeo.Player(iframe);
        player.on('timeupdate', function(data) {
          if (data.seconds >= CONFIG.ctaDelaySeconds) {
            revealCTA();
            player.off('timeupdate');
          }
        });
      }
    });
  }


  // ── EVERGREEN COUNTDOWN TIMER ──────────────────────────
  // Cookie-based: each visitor gets their own countdown
  // Resets after expiry so it always feels fresh
  function startCountdown() {
    var cookieName = 'ta_vsl_countdown';
    var endTime;

    // Check for existing countdown cookie
    var saved = getCookie(cookieName);
    if (saved && parseInt(saved) > Date.now()) {
      endTime = parseInt(saved);
    } else {
      endTime = Date.now() + (CONFIG.countdownMinutes * 60 * 1000);
      setCookie(cookieName, endTime, 1); // expires in 1 day
    }

    function tick() {
      var remaining = endTime - Date.now();
      if (remaining <= 0) {
        // Reset the countdown (evergreen)
        endTime = Date.now() + (CONFIG.countdownMinutes * 60 * 1000);
        setCookie(cookieName, endTime, 1);
      }

      var mins = Math.floor(remaining / 60000);
      var secs = Math.floor((remaining % 60000) / 1000);
      var display = 'This offer expires in <span class="countdown-time">' +
                    pad(mins) + ':' + pad(secs) + '</span>';

      if (countdown) countdown.innerHTML = display;
      if (countdownMobile) countdownMobile.innerHTML = display;

      requestAnimationFrame(tick);
    }

    tick();
  }

  function pad(n) {
    return n < 10 ? '0' + n : n;
  }

  function setCookie(name, value, days) {
    var d = new Date();
    d.setTime(d.getTime() + (days * 24 * 60 * 60 * 1000));
    document.cookie = name + '=' + value + ';expires=' + d.toUTCString() + ';path=/;SameSite=Lax';
  }

  function getCookie(name) {
    var match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
    return match ? match[2] : null;
  }

  // ── DEV/TESTING HELPERS ────────────────────────────────
  // Run in browser console to test:
  //   window.__revealCTA()     — instantly show CTA
  //   window.__resetCountdown() — clear countdown cookie
  window.__revealCTA = revealCTA;
  window.__resetCountdown = function() {
    document.cookie = 'ta_vsl_countdown=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/';
    location.reload();
  };

})();
</script>
